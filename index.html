        function formatThaiDate(dateString) {
            if (!dateString) return '-';
            const parts = dateString.split('-');
            if (parts.length !== 3) return dateString;
            const year = parseInt(parts[0]) + 543;
            const monthIndex = parseInt(parts[1]) - 1;
            const day = parseInt(parts[2]);
            const thaiMonths = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
            return `${day.toString().padStart(2, '0')} ${thaiMonths[monthIndex]} ${year}`;
        }

        
        async function sendTelegramNotification(text) {
            if (!supabaseClient) return;
            try {
                const { error } = await supabaseClient.functions.invoke('notify-telegram', {
                    body: { message: text }
                });
                if (error) throw error;
            } catch (e) {
                console.warn("Edge Fn Error", e);
            }
        }

       

        async function syncUserToDB(userProfile) {
            if (!supabaseClient) return;
            try {
                const { error } = await supabaseClient
                    .from('profiles')
                    .upsert({
                        line_user_id: userProfile.userId,
                        display_name: userProfile.displayName,
                        picture_url: userProfile.pictureUrl,
                        updated_at: new Date()
                    }, { onConflict: 'line_user_id', ignoreDuplicates: false });
                if (error) console.error('Error syncing profile:', error);
            } catch (err) {
                console.error('Exception syncing profile:', err);
            }
        }

        async function fetchUserProfile(userId) {
            if (!supabaseClient) return null;
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('line_user_id', userId)
                    .single();
                if (error) throw error;
                return data;
            } catch (err) {
                return null;
            }
        }

        async function updateUserProfile(userId, updateData) {
            if (!supabaseClient) return { error: 'No client' };
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .update({ ...updateData, updated_at: new Date() })
                    .eq('line_user_id', userId);
                return { data, error };
            } catch (err) {
                return { error: err };
            }
        }

       
        async function fetchNextConfirmedAppointment(userId) {
            if (!supabaseClient) return null;

            
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const today = `${year}-${month}-${day}`;

            try {
                
                const { data, error } = await supabaseClient
                    .from('appointments')
                    .select('*, doctors(name)')
                    .eq('patient_id', userId)
                    .eq('status', 'confirmed') 
                    .gte('appt_date', today)
                    .order('appt_date', { ascending: true })
                    .order('appt_time', { ascending: true })
                    .limit(1)
                    .maybeSingle(); 

                if (error) throw error;
                return data;
            } catch (err) {
               
                return null;
            }
        }

        async function fetchAndRenderNews() {
            if (!supabaseClient) return;
            try {
                const { data: newsList, error } = await supabaseClient
                    .from('news')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(5);

                const container = document.getElementById('news-container');
                container.innerHTML = '';

                if (error || !newsList || newsList.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-400 py-4 text-sm">ยังไม่มีข่าวสารในขณะนี้</div>';
                    return;
                }

                newsList.forEach(news => {
                    const imgHtml = news.image_url
                        ? `<img src="${news.image_url}" class="w-16 h-16 rounded-xl flex-shrink-0 object-cover bg-gray-100" onerror="this.style.display='none'">`
                        : `<div class="w-16 h-16 bg-blue-100 rounded-xl flex-shrink-0 flex items-center justify-center text-2xl text-brand-blue"><i class="fa-solid fa-bullhorn"></i></div>`;

                   
                    const newsStr = encodeURIComponent(JSON.stringify(news));

                    const html = `
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex gap-4 items-start cursor-pointer hover:shadow-md transition" onclick="showNewsDetail('${newsStr}')">
                            ${imgHtml}
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-sm text-brand-coffee truncate">${news.title}</h4>
                                <p class="text-xs text-gray-500 mt-1 line-clamp-2">${news.detail || '-'}</p>
                                <div class="flex justify-between items-end mt-2">
                                    <p class="text-[10px] text-gray-400 text-right">${formatThaiDate(news.created_at.split('T')[0])}</p>
                                    <button onclick="event.stopPropagation(); shareNews('${newsStr}')" class="text-brand-blue hover:text-brand-orange transition text-xs font-bold px-2 py-1 bg-blue-50 rounded-lg flex items-center gap-1">
                                        <i class="fa-solid fa-share-nodes"></i> แชร์
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

            } catch (err) {
                console.error("Fetch News Error:", err);
            }
        }

        async function shareNews(newsStr) {
            const news = JSON.parse(decodeURIComponent(newsStr));

            if (!liff.isApiAvailable('shareTargetPicker')) {
                Swal.fire({
                    title: 'ไม่รองรับ',
                    text: 'อุปกรณ์ของคุณไม่รองรับฟีเจอร์การแชร์นี้',
                    icon: 'warning',
                    confirmButtonColor: '#2660a4'
                });
                return;
            }

            try {
                const result = await liff.shareTargetPicker([
                    {
                        type: "flex",
                        altText: `ข่าวสารจากคลินิก: ${news.title}`,
                        contents: {
                            type: "bubble",
                            hero: news.image_url ? {
                                type: "image",
                                url: news.image_url,
                                size: "full",
                                aspectRatio: "20:13",
                                aspectMode: "cover"
                            } : undefined,
                            body: {
                                type: "box",
                                layout: "vertical",
                                contents: [
                                    { type: "text", text: news.title, weight: "bold", size: "xl", wrap: true },
                                    { type: "text", text: news.detail || "", size: "sm", color: "#666666", wrap: true, margin: "md", maxLines: 3 },
                                    {
                                        type: "button",
                                        style: "link",
                                        height: "sm",
                                        action: {
                                            type: "uri",
                                            label: "ดูรายละเอียด",
                                            uri: "https://liff.line.me/" + LIFF_ID
                                        }
                                    }
                                ]
                            }
                        }
                    }
                ]);

                if (result) {
                    Toast.fire({ icon: 'success', title: 'แชร์ข่าวสารสำเร็จ' });
                }
            } catch (error) {
                console.error("Share Error", error);
                
            }
        }

        async function fetchAndRenderPersonalNews(userId) {
            if (!supabaseClient) return;
            try {
                const { data: notifs, error } = await supabaseClient
                    .from('notifications')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false })
                    .limit(3);

                const section = document.getElementById('personal-news-section');
                const container = document.getElementById('personal-news-container');
                container.innerHTML = '';

                if (error || !notifs || notifs.length === 0) {
                    section.classList.add('hidden');
                    return;
                }

                section.classList.remove('hidden');

                notifs.forEach(notif => {
                    const html = `
                        <div class="bg-white rounded-xl p-3 shadow-sm border-l-4 border-brand-orange flex items-start gap-3">
                            <div class="mt-1 w-8 h-8 bg-orange-100 rounded-full flex items-center justify-center text-brand-orange flex-shrink-0">
                                <i class="fa-solid fa-envelope"></i>
                            </div>
                            <div class="flex-1">
                                <p class="text-sm text-brand-coffee font-medium">${notif.message}</p>
                                <p class="text-[10px] text-gray-400 mt-1 text-right">${formatThaiDate(notif.created_at.split('T')[0])}</p>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });

            } catch (err) {
                console.error("Fetch Notif Error:", err);
            }
        }

        window.showNewsDetail = (newsStr) => {
            const news = JSON.parse(decodeURIComponent(newsStr));
            const imgHtml = news.image_url ? `<img src="${news.image_url}" class="w-full rounded-xl mb-4 max-h-60 object-cover">` : '';

            Swal.fire({
                title: news.title,
                html: `
                    <div class="text-left">
                        ${imgHtml}
                        <p class="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap">${news.detail || ''}</p>
                        <p class="text-xs text-gray-400 mt-4 text-right">ประกาศเมื่อ: ${formatThaiDate(news.created_at.split('T')[0])}</p>
                    </div>
                `,
                confirmButtonText: 'ปิด',
                confirmButtonColor: '#56351e',
                showDenyButton: true,
                denyButtonText: 'แชร์',
                denyButtonColor: '#2660a4'
            }).then((result) => {
                if (result.isDenied) {
                    shareNews(newsStr);
                }
            });
        }

       
        async function fetchAppointments(userId, limit = 20) {
            if (!supabaseClient) return [];
            try {
                // Update select to include doctor name
                const { data, error } = await supabaseClient
                    .from('appointments')
                    .select('*, doctors(name)')
                    .eq('patient_id', userId)
                    .order('appt_date', { ascending: false })
                    .limit(limit);
                if (error) throw error;
                return data;
            } catch (err) {
                return [];
            }
        }

        
        function generateHistoryListHtml(appointments) {
            if (appointments.length === 0) {
                return '<div class="text-center p-4 text-gray-500">ไม่พบประวัติการจอง</div>';
            }

            let listHtml = '<div class="text-left max-h-[60vh] overflow-y-auto space-y-3 p-1" id="history-list-container">';
            appointments.forEach(appt => {
                let statusColor = 'text-orange-600 bg-orange-50';
                let statusText = 'รอการยืนยัน';

                // Status Logic
                if (appt.status === 'confirmed') {
                    statusColor = 'text-green-600 bg-green-50';
                    statusText = 'อนุมัติแล้ว';
                } else if (appt.status === 'cancelled') {
                    statusColor = 'text-red-600 bg-red-50';
                    statusText = 'ยกเลิก';
                } else if (appt.status === 'completed') {
                    statusColor = 'text-blue-600 bg-blue-50';
                    statusText = 'ตรวจเสร็จสิ้น';
                }

               
                const doctorName = appt.doctors?.name ? `<br><span class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-user-doctor"></i> ${appt.doctors.name}</span>` : '';

                listHtml += `
                    <div class="p-3 border rounded-xl shadow-sm bg-white">
                        <div class="flex justify-between items-start mb-1">
                            <div class="font-bold text-brand-blue">${formatThaiDate(appt.appt_date)}</div>
                            <span class="text-xs px-2 py-1 rounded-full ${statusColor}">${statusText}</span>
                        </div>
                        <div class="text-sm text-gray-600">เวลา: ${appt.appt_time}</div>
                        <div class="text-sm text-gray-600 line-clamp-2">${appt.symptom_detail || '-'}</div>
                        ${doctorName}
                    </div>`;
            });

            if (appointments.length >= currentHistoryLimit) {
                listHtml += `<div class="text-center mt-2 pt-2"><button onclick="window.expandHistory()" id="btn-load-more" class="text-sm text-brand-blue hover:text-brand-orange font-medium underline">ดูเพิ่มเติม</button></div>`;
            }
            listHtml += '</div>';
            return listHtml;
        }

        window.expandHistory = async () => {
            const btn = document.getElementById('btn-load-more');
            if (btn) btn.innerText = 'กำลังโหลด...';
            currentHistoryLimit += 20;
            const appointments = await fetchAppointments(profile.userId, currentHistoryLimit);
            Swal.update({ html: generateHistoryListHtml(appointments) });
        }

        
        async function fetchDoctors() {
            if (!supabaseClient) return [];
            try {
                const { data, error } = await supabaseClient
                    .from('doctors')
                    .select('*')
                    .eq('is_active', true) // Filter only active doctors
                    .order('name');
                if (error) throw error;
                return data;
            } catch (err) {
                console.error('Error fetching doctors:', err);
                return [];
            }
        }

        async function createAppointment(bookingData) {
            if (!supabaseClient) return { error: { message: 'Database not initialized' } };
            try {
                const { data, error } = await supabaseClient
                    .from('appointments')
                    .insert({
                        patient_id: profile.userId,
                        appt_date: bookingData.date,
                        appt_time: bookingData.time,
                        symptom_detail: `${bookingData.clinic} - ${bookingData.dept} : ${bookingData.symptom || '-'}`,
                        status: 'pending'
                    });
                return { data, error };
            } catch (err) {
                return { error: err };
            }
        }

        async function fetchMasterData() {
            if (!supabaseClient) return { clinics: [], depts: [] };
            try {
                const { data: clinics } = await supabaseClient.from('clinics').select('name').order('name');
                const { data: depts } = await supabaseClient.from('departments').select('name').order('name');
                const safeClinics = (clinics && clinics.length > 0) ? clinics : [{ name: 'สาขาสยามสแควร์' }, { name: 'สาขาลาดพร้าว' }];
                const safeDepts = (depts && depts.length > 0) ? depts : [{ name: 'อายุรกรรมทั่วไป' }, { name: 'ทันตกรรม' }];
                return { clinics: safeClinics, depts: safeDepts };
            } catch (e) {
                return { clinics: [{ name: 'สาขาหลัก' }], depts: [{ name: 'ทั่วไป' }] };
            }
        }

        
        async function initializeApp() {
            try {
                if (typeof window.supabase !== 'undefined') {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    console.log("Supabase Initialized");
                }

                await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
                await liff.ready;
                
                if (liff.isLoggedIn()) {
                    profile = await liff.getProfile();
                    updateUI(profile);
                    await syncUserToDB(profile);
                    await updateDashboard(profile.userId);
                    await fetchAndRenderNews();
                    await fetchAndRenderPersonalNews(profile.userId);
                    toggleLoader(false); 
                } else {
                    
                    document.getElementById('login-overlay').classList.remove('hidden');
                    toggleLoader(false); 
                }
            } catch (error) {
                console.error("Init Error:", error);
                toggleLoader(false);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถเชื่อมต่อระบบได้',
                    confirmButtonColor: '#2660a4'
                });
            }
        }

        function login() {
            liff.login({ redirectUri: window.location.href });
        }

        function updateUI(userProfile) {
            document.getElementById('display-name').innerText = userProfile.displayName;
            const imgEl = document.getElementById('profile-img');
            if (userProfile.pictureUrl) imgEl.src = userProfile.pictureUrl;
        }

        
        async function handleMenuClick(action) {
            const btn = event.currentTarget;
            if (btn) {
                btn.classList.add('scale-95');
                setTimeout(() => btn.classList.remove('scale-95'), 150);
            }

            
            if (action === 'booking') {
                Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading() });
                const { clinics, depts } = await fetchMasterData();
                const clinicOptions = clinics.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                const deptOptions = depts.map(d => `<option value="${d.name}">${d.name}</option>`).join('');

                const { value: formValues } = await Swal.fire({
                    title: '<span class="text-brand-coffee text-xl font-bold">จองคิวแพทย์</span>',
                    html: `
                        <div class="text-left">
                            <div class="swal-custom-input"><label>เลือกคลินิก / สาขา</label><select id="swal-clinic">${clinicOptions}</select></div>
                            <div class="swal-custom-input"><label>แผนก</label><select id="swal-dept">${deptOptions}</select></div>
                            <div class="swal-custom-input"><label>วันที่</label><input type="date" id="swal-date" min="${new Date().toISOString().split('T')[0]}"></div>
                            <div class="swal-custom-input"><label>เวลา</label><input type="time" id="swal-time"></div>
                            <div class="swal-custom-input"><label>อาการเบื้องต้น</label><textarea id="swal-symptom" rows="2" placeholder="เช่น ปวดหัว..."></textarea></div>
                        </div>`,
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยันการจอง',
                    confirmButtonColor: '#2660a4',
                    cancelButtonText: 'ยกเลิก',
                    focusConfirm: false,
                    preConfirm: () => {
                        const date = document.getElementById('swal-date').value;
                        const time = document.getElementById('swal-time').value;
                        if (!date || !time) { Swal.showValidationMessage('กรุณาระบุวันที่และเวลา'); return false; }
                        return {
                            clinic: document.getElementById('swal-clinic').value,
                            dept: document.getElementById('swal-dept').value,
                            date: date, time: time,
                            symptom: document.getElementById('swal-symptom').value
                        }
                    }
                });

                if (formValues) {
                    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
                    const { error } = await createAppointment(formValues);
                    if (error) {
                        Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: error.message || 'กรุณาลองใหม่', confirmButtonColor: '#c47335' });
                    } else {
                        const notifMsg = `🆕 *จองคิวใหม่ (ผ่านแอป)*\n👤 คุณ ${profile.displayName}\n🏥 ${formValues.clinic}\n📅 ${formatThaiDate(formValues.date)} เวลา ${formValues.time}`;
                        sendTelegramNotification(notifMsg);
                        Swal.fire({ icon: 'success', title: 'จองคิวสำเร็จ!', text: 'ระบบส่งข้อมูลไปยังคลินิกเรียบร้อยแล้ว', confirmButtonColor: '#2660a4' });
                    }
                }

                
            } else if (action === 'history') {
                currentHistoryLimit = 20;
                Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading() });
                const appointments = await fetchAppointments(profile.userId, currentHistoryLimit);
                const listHtml = generateHistoryListHtml(appointments);
                Swal.fire({ title: 'ประวัติการจอง', html: listHtml, confirmButtonText: 'ปิด', confirmButtonColor: '#56351e' });

                
            } else if (action === 'doctors') {
                Swal.fire({ title: 'กำลังโหลด...', didOpen: () => Swal.showLoading() });
                const doctors = await fetchDoctors();
                if (doctors.length === 0) {
                    Swal.fire({ title: 'ไม่พบข้อมูล', text: 'ไม่มีแพทย์ปฏิบัติงานในขณะนี้', icon: 'info', confirmButtonColor: '#2660a4' });
                } else {
                    let listHtml = '<div class="grid grid-cols-1 gap-3 p-1 max-h-[60vh] overflow-y-auto">';
                    doctors.forEach(doc => {
                        const imgSrc = doc.image_url || 'https://cdn-icons-png.flaticon.com/512/3774/3774299.png';
                        listHtml += `<div class="flex items-center gap-4 p-3 border rounded-xl shadow-sm bg-white text-left"><img src="${imgSrc}" class="w-14 h-14 rounded-full object-cover border-2 border-brand-blue"><div><h4 class="font-bold text-brand-coffee">${doc.name}</h4><p class="text-xs text-gray-500">${doc.specialty || 'แพทย์ทั่วไป'}</p></div></div>`;
                    });
                    listHtml += '</div>';
                    Swal.fire({ title: 'รายชื่อแพทย์', html: listHtml, confirmButtonText: 'ปิด', confirmButtonColor: '#56351e', width: '90%' });
                }

               
            } else if (action === 'contact') {
                const link = "https://line.me/R/oaMessage/@404jmfjo/?ติดต่อเรา";
                if (liff.isInClient()) liff.openWindow({ url: link, external: true });
                else window.location.href = link;

               
            } else if (action === 'profile') {
                Swal.fire({ title: 'กำลังโหลดข้อมูล...', didOpen: () => Swal.showLoading() });

                const user = await fetchUserProfile(profile.userId);

                const phone = user?.phone_number || '';
                const birthDate = user?.birth_date || '';
                const displayName = user?.display_name || profile.displayName;
                const pictureUrl = user?.picture_url || profile.pictureUrl;

                const { value: updateData } = await Swal.fire({
                    html: `
                        <div class="profile-header-bg text-center">
                            <img src="${pictureUrl}" class="w-24 h-24 rounded-full border-4 border-white shadow-md mx-auto object-cover bg-gray-200">
                            <h3 class="text-white font-bold text-lg mt-3">${displayName}</h3>
                            <p class="text-brand-mint text-xs opacity-80">คนไข้</p>
                        </div>
                        <div class="text-left px-2">
                            <div class="swal-custom-input">
                                <label>เบอร์โทรศัพท์ติดต่อ <span class="text-red-500">*</span></label>
                                <input type="tel" id="profile-phone" required maxlength="10"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)"
                            placeholder="08xxxxxxxx" value="${phone}">
                            </div>
                            <div class="swal-custom-input">
                                <label>วันเกิด</label>
                                <input type="date" id="profile-birth" value="${birthDate}">
                            </div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'บันทึกข้อมูล',
                    confirmButtonColor: '#2660a4',
                    cancelButtonText: 'ปิด',
                    customClass: { popup: 'rounded-3xl overflow-hidden' },
                    preConfirm: () => {
                        const newPhone = document.getElementById('profile-phone').value;
                        const newBirth = document.getElementById('profile-birth').value;
                        if (!newPhone) { Swal.showValidationMessage('กรุณาระบุเบอร์โทรศัพท์'); return false; }
                        return { phone_number: newPhone, birth_date: newBirth };
                    }
                });

                if (updateData) {
                    Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });
                    const { error } = await updateUserProfile(profile.userId, updateData);
                    if (error) { Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: 'กรุณาลองใหม่อีกครั้ง' }); }
                    else { Toast.fire({ icon: 'success', title: 'อัปเดตข้อมูลสำเร็จ' }); }
                }
            }
        }

        function logout() {
            if (liff.isLoggedIn()) {
                liff.logout();
                window.location.reload();
            }
        }

        window.onload = () => {
            setTimeout(initializeApp, 500);
        };
    </script>
</body>

</html>
