<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doctor Portal</title>
    <link id="favicon" rel="icon" href="https://cdn-icons-png.flaticon.com/128/2785/2785482.png">
    <link id="apple-touch-icon" rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/128/2785/2785482.png">
    <meta name="description" content="Doctor Portal for MINI App" />
    <meta name="author" content="iton5" />
    <meta property="og:title" content="Doctor Portal-iton5-thailand" />
    <meta property="og:description" content="Doctor Portal for MINI App" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/128/2785/2785482.png" />

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>   <!-- ← เพิ่มบรรทัดนี้ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#2660a4',
                            mint: '#edf7f6',
                            orange: '#f19953',
                            green: '#22c55e',
                            coffee: '#56351e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f3f4f6;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2660a4;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s;
        }

        .hidden-opacity {
            opacity: 0;
            pointer-events: none;
        }


        .toggle-checkbox:checked {
            right: 0;
            border-color: #68D391;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #68D391;
        }

        .timeline-line {
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e5e7eb;
            z-index: 0;
        }
    </style>
</head>

<body class="bg-brand-mint min-h-screen pb-24">


    <div id="loader">
        <i class="fa-solid fa-user-doctor fa-bounce text-6xl mb-4"></i>
        <h2 class="text-xl font-bold">Doctor Portal</h2>
        <p class="text-sm opacity-80 mt-2">กำลังโหลดตารางงาน...</p>
    </div>


    <header class="bg-white shadow-sm sticky top-0 z-30">
        <div class="px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img id="doc-img" src=""
                    class="w-12 h-12 rounded-full border-2 border-brand-blue object-cover bg-gray-200">
                <div>
                    <h1 class="font-bold text-brand-coffee text-lg" id="doc-name">สวัสดีคุณหมอ</h1>
                    <p class="text-xs text-gray-500" id="doc-spec">กำลังโหลด...</p>
                </div>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500"><i
                    class="fa-solid fa-right-from-bracket text-xl"></i></button>
        </div>


        <div class="px-6 pb-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <span class="text-sm font-bold text-gray-600">สถานะรับงาน:</span>
            <div class="relative inline-block w-32 align-middle select-none transition duration-200 ease-in">
                <input type="checkbox" name="toggle" id="status-toggle"
                    class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 left-1 top-1 z-10"
                    onclick="toggleWorkStatus(this)" />
                <label for="status-toggle" id="status-label"
                    class="toggle-label block overflow-hidden h-8 rounded-full bg-gray-300 cursor-pointer text-xs text-white font-bold text-center leading-8 transition-colors duration-300 pr-8">
                    พักงาน
                </label>
            </div>
        </div>
    </header>


    <div class="px-6 mt-6 grid grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-brand-blue">
            <p class="text-xs text-gray-500">คนไข้วันนี้</p>
            <h2 class="text-3xl font-bold text-brand-coffee" id="count-total">0</h2>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-brand-orange">
            <p class="text-xs text-gray-500">รอตรวจ</p>
            <h2 class="text-3xl font-bold text-brand-orange" id="count-pending">0</h2>
        </div>
    </div>


    <div class="px-6 mt-8">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-brand-coffee">คิวตรวจวันนี้</h2>
            <div class="flex items-center gap-2">
                <span class="text-xs text-gray-500 bg-gray-200 px-2 py-1 rounded-lg" id="today-date">-</span>
                <button onclick="fetchTodaySchedule()" class="text-brand-blue hover:text-brand-orange transition"><i
                        class="fa-solid fa-rotate"></i></button>
            </div>
        </div>

        <div class="relative space-y-6" id="appointment-container">
            <div class="timeline-line"></div>

            <div class="text-center text-gray-400 py-10">ไม่มีนัดหมายในวันนี้</div>
        </div>
    </div>


    <div class="fixed bottom-6 right-6 z-40">
        <button onclick="handleEmergencyLeave()"
            class="bg-red-100 text-red-600 w-14 h-14 rounded-full shadow-lg flex items-center justify-center border-2 border-red-200 hover:bg-red-200 hover:scale-105 transition">
            <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
        </button>
    </div>

    <script>
        // --- Configuration ---
        const LIFF_ID = "2010692253-05gwqcyB";
        //const SUPABASE_URL = "https://yexrmeidwedazbiaiazy.supabase.co";
        //const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlleHJtZWlkd2VkYXpiaWFpYXp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NTUzMjEsImV4cCI6MjA5OTUzMTMyMX0.mABokSstxoizRDKK_UFCL6Zd52AqxfjSolKglWxokNk";

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const hideLoader = () => document.getElementById('loader').classList.add('hidden-opacity');
        
        let currentDoctorId = null;
        let currentAppointments = [];
        let realtimeSubscription = null;

        
        function getThaiDate() {
            const date = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            return date.toLocaleDateString('th-TH', options);
        }

       
        function getLocalISODate() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        
        async function initializeDoctor() {
            try {
                document.getElementById('today-date').innerText = getThaiDate();

                await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
                await liff.ready;
                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                    return;
                }

                const profile = await liff.getProfile();

               
                const { data: userProfile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('role')
                    .eq('line_user_id', profile.userId)
                    .single();

                if (profileError || !userProfile || userProfile.role !== 'doctor') {
                    hideLoader();  // ← เพิ่ม
                    Swal.fire({
                        icon: 'error',
                        title: 'Access Denied',
                        text: 'ระบบสำหรับแพทย์เท่านั้น',
                        confirmButtonText: 'ปิด',
                        allowOutsideClick: false
                    }).then(() => liff.closeWindow());
                    return;
                }

                
                const { data: doctorData, error: docError } = await supabaseClient
                    .from('doctors')
                    .select('*')
                    .eq('profile_id', profile.userId)
                    .single();

                if (docError || !doctorData) {
                    hideLoader();  // ← เพิ่ม
                    Swal.fire('Error', 'ไม่พบข้อมูลแพทย์ที่เชื่อมโยงกับบัญชี LINE นี้ กรุณาติดต่อ Admin', 'error');
                    return;
                }

                currentDoctorId = doctorData.id;

              
                document.getElementById('doc-name').innerText = doctorData.name;
                document.getElementById('doc-spec').innerText = doctorData.specialty;
                document.getElementById('doc-img').src = doctorData.image_url || profile.pictureUrl;

                
                const toggle = document.getElementById('status-toggle');
                toggle.checked = doctorData.is_active;
                updateToggleUI(doctorData.is_active);

                
                await fetchTodaySchedule();
                setupRealtimeListener();

                
                document.getElementById('loader').classList.add('hidden-opacity');

            } catch (err) {
                console.error("Init Error:", err);
                hideLoader();  // ← เพิ่ม
                Swal.fire('Error', 'เกิดข้อผิดพลาดในการโหลดข้อมูล', 'error');
            }
        }

        

        function setupRealtimeListener() {
            if (realtimeSubscription) return;

            realtimeSubscription = supabaseClient
                .channel('public:appointments')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'appointments',
                    filter: `doctor_id=eq.${currentDoctorId}`
                }, payload => {
                    console.log('Change received!', payload);

                    const Toast = Swal.mixin({
                        toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
                        didOpen: (toast) => {
                            toast.addEventListener('mouseenter', Swal.stopTimer)
                            toast.addEventListener('mouseleave', Swal.resumeTimer)
                        }
                    });

                    if (payload.eventType === 'INSERT') {
                        Toast.fire({ icon: 'info', title: 'มีคนไข้ใหม่เข้ามา!' });
                    } else if (payload.eventType === 'UPDATE') {
                        Toast.fire({ icon: 'info', title: 'ข้อมูลการนัดหมายมีการเปลี่ยนแปลง' });
                    }

                    fetchTodaySchedule();
                })
                .subscribe();
        }

        async function fetchTodaySchedule() {
           
            const today = getLocalISODate();

            const { data, error } = await supabaseClient
                .from('appointments')
                .select(`*, profiles(display_name, picture_url, phone_number, birth_date)`)
                .eq('doctor_id', currentDoctorId)
                .eq('appt_date', today)
                .in('status', ['confirmed', 'completed'])
                .order('appt_time', { ascending: true });

            if (error) {
                console.error("Fetch Schedule Error:", error);
                return;
            }

            currentAppointments = data;
            renderTimeline(data);
            updateStats(data);
        }

        function renderTimeline(appointments) {
            const container = document.getElementById('appointment-container');
            container.innerHTML = '<div class="timeline-line"></div>';

            if (appointments.length === 0) {
                container.innerHTML += `<div class="text-center text-gray-400 py-10 bg-white/50 rounded-xl">ไม่มีนัดหมายในวันนี้</div>`;
                return;
            }

            appointments.forEach(appt => {
                const patient = appt.profiles;
                const isCompleted = appt.status === 'completed';
                const opacityClass = isCompleted ? 'opacity-60' : '';
                const statusIcon = isCompleted ? '<i class="fa-solid fa-circle-check text-green-500"></i>' : '<i class="fa-regular fa-clock text-brand-orange"></i>';
                const btnAction = isCompleted ? '' : `<button onclick="completeJob(${appt.id})" class="mt-2 text-xs bg-brand-blue text-white px-3 py-1 rounded-full shadow-sm hover:bg-opacity-90 transition active:scale-95">ตรวจเสร็จสิ้น</button>`;

                let age = '-';
                if (patient.birth_date) {
                    const birth = new Date(patient.birth_date);
                    const now = new Date();
                    age = now.getFullYear() - birth.getFullYear();
                }

                
                const timeDisplay = appt.appt_time ? appt.appt_time.slice(0, 5) : "--:--";

                const html = `
                    <div class="relative pl-12 ${opacityClass} transition-all duration-500">
                        <div class="absolute left-0 top-0 w-12 text-center">
                            <span class="text-xs font-bold text-gray-500 block bg-white border border-gray-200 rounded px-1 z-10 relative">${timeDisplay}</span>
                        </div>
                        <div class="absolute left-[21px] top-6 w-2 h-2 bg-brand-blue rounded-full ring-4 ring-white z-10"></div>
                        
                        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-2">
                            <div class="flex justify-between items-start">
                                <div class="flex items-center gap-3">
                                    <img src="${patient.picture_url || 'https://cdn-icons-png.flaticon.com/128/2785/2785482.png'}" class="w-10 h-10 rounded-full bg-gray-200 object-cover">
                                    <div>
                                        <h3 class="font-bold text-brand-coffee text-sm">${patient.display_name}</h3>
                                        <p class="text-xs text-gray-500">อายุ: ${age} ปี | โทร: <a href="tel:${patient.phone_number}" class="text-brand-blue">${patient.phone_number || '-'}</a></p>
                                    </div>
                                </div>
                                <div class="text-xl">${statusIcon}</div>
                            </div>
                            
                            <div class="bg-brand-mint/50 p-2 rounded-lg text-xs text-gray-700 mt-1">
                                <span class="font-bold">อาการเบื้องต้น:</span> ${appt.symptom_detail || '-'}
                            </div>

                            <div class="flex justify-end">
                                ${btnAction}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function updateStats(data) {
            document.getElementById('count-total').innerText = data.length;
            const pending = data.filter(x => x.status === 'confirmed').length;
            document.getElementById('count-pending').innerText = pending;
        }

       

        function updateToggleUI(isChecked) {
            const label = document.getElementById('status-label');
            const checkbox = document.getElementById('status-toggle');

            checkbox.checked = isChecked;

            if (isChecked) {
                label.style.backgroundColor = '#22c55e'; // Green
                label.innerHTML = '<span class="pl-2">รับงาน</span>';
                label.classList.remove('pr-8');
                label.classList.add('pl-2', 'text-left');
            } else {
                label.style.backgroundColor = '#9ca3af'; // Gray
                label.innerHTML = '<span class="pr-2">พักงาน</span>';
                label.classList.remove('pl-2', 'text-left');
                label.classList.add('pr-8', 'text-right');
            }
        }

        async function toggleWorkStatus(checkbox) {
            const isActive = checkbox.checked;

            if (!isActive) {
                const pendingCount = currentAppointments.filter(x => x.status === 'confirmed').length;
                if (pendingCount > 0) {
                    checkbox.checked = true;
                    const result = await Swal.fire({
                        title: 'มีคนไข้รอตรวจ!',
                        text: `คุณยังมีคนไข้รออยู่ ${pendingCount} ท่าน ต้องการพักงานจริงหรือไม่?`,
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonText: 'ยืนยันพักงาน',
                        cancelButtonText: 'กลับไปทำงาน',
                        confirmButtonColor: '#d33'
                    });
                    if (!result.isConfirmed) return;
                    checkbox.checked = false;
                }
            }

            updateToggleUI(checkbox.checked);

            const { error } = await supabaseClient
                .from('doctors')
                .update({ is_active: checkbox.checked })
                .eq('id', currentDoctorId);

            if (error) {
                console.error("Status Update Error:", error);
                Toast.fire({ icon: 'error', title: 'อัปเดตสถานะไม่สำเร็จ' });
                checkbox.checked = !checkbox.checked;
                updateToggleUI(checkbox.checked);
            } else {
                Toast.fire({ icon: 'success', title: checkbox.checked ? 'เริ่มงานแล้ว' : 'พักงานแล้ว' });
            }
        }

      

        async function completeJob(apptId) {
            const appt = currentAppointments.find(a => a.id === apptId);
            if (!appt) {
                console.error("Appointment not found locally");
                return;
            }

            const { value: treatmentNote } = await Swal.fire({
                title: 'บันทึกผลการรักษา',
                html: `
                    <div class="text-left">
                        <p class="text-sm text-gray-600 mb-2">ระบุรายละเอียดการรักษา, ยาที่จ่าย, หรือคำแนะนำ (ข้อมูลนี้จะถูกส่งไปยัง "ข้อความถึงคุณ" ของคนไข้)</p>
                        <textarea id="treatment-note" class="w-full border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-brand-blue/50" rows="4" placeholder="เช่น อาการดีขึ้น จ่ายยาแก้ปวด นัดดูอาการอีก 1 สัปดาห์..."></textarea>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'บันทึกและจบงาน',
                confirmButtonColor: '#22c55e',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => {
                    const note = document.getElementById('treatment-note').value;
                    if (!note) {
                        Swal.showValidationMessage('กรุณาระบุรายละเอียดการรักษา');
                    }
                    return note;
                }
            });

            if (treatmentNote) {
                Swal.fire({ title: 'กำลังบันทึก...', didOpen: () => Swal.showLoading() });

                const { error: updateError } = await supabaseClient
                    .from('appointments')
                    .update({ status: 'completed' })
                    .eq('id', apptId);

                if (updateError) {
                    Swal.fire('Error', updateError.message, 'error');
                    return;
                }

                const msgHeader = `🏥 **ผลการตรวจรักษา**\n📅 วันที่: ${getThaiDate()}`;
                const fullMessage = `${msgHeader}\n\n${treatmentNote}`;

                const { error: notifError } = await supabaseClient
                    .from('notifications')
                    .insert({
                        user_id: appt.patient_id,
                        message: fullMessage,
                        type: 'personal',
                        status: 'unread'
                    });

                if (!notifError) {
                    Toast.fire({ icon: 'success', title: 'บันทึกเรียบร้อย' });
                } else {
                    console.error("Notif Error:", notifError);
                    Toast.fire({ icon: 'warning', title: 'จบงานแล้ว แต่บันทึกข้อความไม่สำเร็จ' });
                }
            }
        }

        async function handleEmergencyLeave() {
            const pendingCount = currentAppointments.filter(x => x.status === 'confirmed').length;

            const { value: reason } = await Swal.fire({
                title: 'แจ้งลางานด่วน',
                html: `
                    <div class="text-left text-sm text-gray-600 mb-2">
                        <p class="mb-2"><strong class="text-red-500">คำเตือน:</strong> การลางานด่วนจะแจ้งเตือนไปยัง Admin ทันที</p>
                        <p>จำนวนคนไข้คงเหลือ: <strong>${pendingCount}</strong> ท่าน</p>
                    </div>
                    <textarea id="leave-reason" class="w-full border rounded-lg p-2" placeholder="ระบุสาเหตุ..."></textarea>
                `,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ยืนยันการลา',
                confirmButtonColor: '#d33',
                preConfirm: () => document.getElementById('leave-reason').value
            });

            if (reason) {
                Swal.fire({ title: 'กำลังแจ้ง Admin...', didOpen: () => Swal.showLoading() });

                await supabaseClient.from('doctors').update({ is_active: false }).eq('id', currentDoctorId);
                updateToggleUI(false);
                document.getElementById('status-toggle').checked = false;

                const docName = document.getElementById('doc-name').innerText;
                const msg = `🚨 **หมอแจ้งลางานด่วน!**\n👨‍⚕️ ${docName}\n💬 สาเหตุ: ${reason}\n👥 คนไข้ค้าง: ${pendingCount} คน\n⚠️ กรุณาตรวจสอบและติดต่อคนไข้`;

                await supabaseClient.functions.invoke('notify-telegram', { body: { message: msg } });

                Swal.fire({
                    icon: 'success',
                    title: 'แจ้งเรียบร้อย',
                    text: 'ระบบได้แจ้ง Admin ให้จัดการคิวที่เหลือแล้ว',
                    confirmButtonColor: '#2660a4'
                });
            }
        }

        function logout() {
            liff.logout();
            window.location.reload();
        }

        const Toast = Swal.mixin({
            toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        window.onload = () => {
            setTimeout(initializeDoctor, 500);
        };
    </script>
</body>

</html>
